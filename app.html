<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodMoji — Find Your Emoji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a0f; --surface:#13131a; --border:#1e1e2e; --text:#e8e8f0; --muted:#6b6b80;
      --happy:#f9c846; --sad:#5ba4f5; --neutral:#a78bfa; --angry:#f97316; --bored:#34d399;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
    nav { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.9); backdrop-filter:blur(12px); position:sticky; top:0; z-index:10; }
    .logo { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.2rem; letter-spacing:-.03em; }
    .logo span { color:var(--happy); }
    nav a { color:var(--muted); text-decoration:none; font-size:.85rem; }
    main { flex:1; max-width:700px; width:100%; margin:0 auto; padding:2.5rem 1.5rem; }
    .api-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem 1.5rem; margin-bottom:2rem; display:flex; align-items:center; gap:.8rem; flex-wrap:wrap; }
    .api-section label { font-size:.82rem; color:var(--muted); white-space:nowrap; }
    .api-section input { flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:.45rem .8rem; font-size:.85rem; outline:none; }
    .api-section input:focus { border-color:var(--happy); }
    .save-btn { background:var(--happy); color:#0a0a0f; border:none; border-radius:7px; padding:.45rem 1rem; font-size:.82rem; font-weight:600; cursor:pointer; }
    .key-status { font-size:.75rem; color:var(--bored); }
    .tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; }
    .tab { flex:1; padding:.7rem; background:var(--surface); border:1px solid var(--border); border-radius:9px; color:var(--muted); font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:.9rem; cursor:pointer; transition:all .2s; text-align:center; }
    .tab.active { background:rgba(249,200,70,0.1); border-color:var(--happy); color:var(--happy); }
    .panel { display:none; }
    .panel.active { display:block; }
    .drop-zone { border:2px dashed var(--border); border-radius:14px; padding:3rem 1.5rem; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; }
    .drop-zone:hover, .drop-zone.dragover { border-color:var(--happy); background:rgba(249,200,70,0.04); }
    .drop-icon { font-size:2.5rem; margin-bottom:.8rem; }
    .drop-zone h3 { font-family:'Bricolage Grotesque',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:.4rem; }
    .drop-zone p { font-size:.85rem; color:var(--muted); }
    .browse-btn { display:inline-block; border:1px solid var(--border); border-radius:7px; padding:.4rem 1.1rem; font-size:.82rem; color:var(--text); background:var(--surface); cursor:pointer; margin-top:.5rem; }
    .preview-wrap { margin-top:1.2rem; border-radius:12px; overflow:hidden; border:1px solid var(--border); position:relative; display:none; }
    .preview-wrap img { width:100%; display:block; max-height:360px; object-fit:contain; background:#000; }
    .remove-preview { position:absolute; top:.6rem; right:.6rem; background:rgba(0,0,0,.6); border:none; color:#fff; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:1rem; }
    .camera-wrap { border-radius:14px; overflow:hidden; border:1px solid var(--border); background:#000; }
    #video { width:100%; max-height:360px; object-fit:cover; display:block; }
    .cam-placeholder { height:280px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; color:var(--muted); font-size:3rem; }
    .cam-controls { margin-top:1rem; display:flex; gap:.8rem; }
    .cam-btn { flex:1; padding:.75rem; border:none; border-radius:9px; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer; }
    .cam-btn.start { background:var(--happy); color:#0a0a0f; }
    .cam-btn.snap { background:var(--bored); color:#0a0a0f; }
    .cam-btn.stop { background:var(--surface); border:1px solid var(--border); color:var(--muted); }
    .cam-btn:disabled { opacity:.35; cursor:not-allowed; }
    #snapCanvas { display:none; width:100%; }
    .analyse-btn { width:100%; margin-top:1.5rem; padding:1rem; border:none; border-radius:10px; background:var(--happy); color:#0a0a0f; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; cursor:pointer; box-shadow:0 0 24px rgba(249,200,70,0.2); }
    .analyse-btn:disabled { opacity:.4; cursor:not-allowed; }
    .loading { display:none; text-align:center; padding:2rem; color:var(--muted); }
    .loading.active { display:block; }
    .spinner { font-size:2.5rem; display:inline-block; animation:spin 1s linear infinite; margin-bottom:.8rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #resultOverlay { display:none; position:fixed; inset:0; z-index:1000; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:2rem; }
    #resultOverlay.show { display:flex; }
    .overlay-bg { position:absolute; inset:0; background:var(--bg); opacity:.97; }
    .overlay-glow { position:absolute; inset:0; }
    .overlay-content { position:relative; z-index:2; animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes popIn { from { transform:scale(.4); opacity:0; } to { transform:scale(1); opacity:1; } }
    .result-emoji { font-size:clamp(8rem,25vw,14rem); line-height:1; display:block; }
    .result-mood { font-family:'Bricolage Grotesque',sans-serif; font-size:clamp(2rem,8vw,4rem); font-weight:800; letter-spacing:-.04em; margin:.5rem 0 1rem; }
    .result-desc { font-size:clamp(1rem,3vw,1.3rem); color:var(--muted); max-width:400px; }
    .result-msg { margin-top:1.2rem; font-size:1rem; color:var(--text); background:rgba(255,255,255,0.05); border-radius:10px; padding:.8rem 1.4rem; max-width:420px; font-style:italic; }
    .try-again { margin-top:2.5rem; background:transparent; border:1px solid var(--border); color:var(--muted); padding:.65rem 1.6rem; border-radius:8px; font-size:.88rem; cursor:pointer; display:block; }
    #closeBtn { position:absolute; top:1.2rem; right:1.5rem; z-index:3; background:none; border:none; color:var(--muted); font-size:1.6rem; cursor:pointer; }
    .error-box { display:none; margin-top:1rem; background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.3); border-radius:9px; padding:1rem 1.2rem; font-size:.85rem; color:#f97316; }
    .error-box.show { display:block; }
  </style>
</head>
<body>
<nav>
  <div class="logo">Mood<span>Moji</span></div>
  <a href="index.html">← Back</a>
</nav>
<main>
  <div class="api-section">
    <label>🔑API Key</label>
    <input type="password" id="apiKey" placeholder="AIza…"/>
    <button class="save-btn" onclick="saveKey()">Save</button>
    <span class="key-status" id="keyStatus"></span>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabUpload" onclick="switchTab('upload')">📁 Upload Photo</div>
    <div class="tab" id="tabCamera" onclick="switchTab('camera')">📸 Take Selfie</div>
  </div>
  <div class="panel active" id="panelUpload">
    <label for="fileInput" style="display:block; cursor:pointer;">
      <div class="drop-zone" id="dropZone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <div class="drop-icon">🖼️</div>
        <h3>Drop your photo here</h3>
        <p>or click to browse</p>
        <span class="browse-btn">Browse files</span>
        <p style="margin-top:.6rem; font-size:.75rem; color:var(--muted)">JPG, PNG, WEBP — any size</p>
      </div>
    </label>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)" style="display:none;"/>
    <div class="preview-wrap" id="uploadPreviewWrap">
      <img id="uploadPreview" src="" alt="preview"/>
      <button class="remove-preview" onclick="clearUpload()">✕</button>
    </div>
  </div>
  <div class="panel" id="panelCamera">
    <div class="camera-wrap">
      <div class="cam-placeholder" id="camPlaceholder">📷</div>
      <video id="video" autoplay playsinline style="display:none;"></video>
      <canvas id="snapCanvas"></canvas>
    </div>
    <div class="cam-controls">
      <button class="cam-btn start" id="startBtn" onclick="startCamera()">Start camera</button>
      <button class="cam-btn snap" id="snapBtn" onclick="snapPhoto()" disabled>Snap photo</button>
      <button class="cam-btn stop" id="stopBtn" onclick="stopCamera()" disabled>Stop</button>
    </div>
  </div>
  <button class="analyse-btn" id="analyseBtn" onclick="analyse()" disabled>Find my emoji →</button>
  <div class="loading" id="loading"><div class="spinner">🤔</div><p>Reading your expression…</p></div>
  <div class="error-box" id="errorBox"></div>
</main>
<div id="resultOverlay">
  <div class="overlay-bg"></div>
  <div class="overlay-glow" id="overlayGlow"></div>
  <button id="closeBtn" onclick="closeResult()">✕</button>
  <div class="overlay-content">
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-mood" id="resultMood"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="try-again" onclick="closeResult()">Try another photo</button>
  </div>
</div>
<script>
const MOODS = {
  happy:   { emoji:'😄', color:'#f9c846', glow:'rgba(249,200,70,0.25)',  label:'Happy',   desc:'That smile? Absolutely radiant.',             msg:'Keep shining — the world needs that energy! ✨' },
  sad:     { emoji:'😢', color:'#5ba4f5', glow:'rgba(91,164,245,0.25)',  label:'Sad',     desc:'Aw, you look like you need a hug.',            msg:"It's okay to feel this way. Better days are coming 💙" },
  neutral: { emoji:'😐', color:'#a78bfa', glow:'rgba(167,139,250,0.25)', label:'Neutral', desc:'Feeling precisely… nothing in particular.',    msg:"Unreadable. A true mystery. We respect it 😌" },
  angry:   { emoji:'😠', color:'#f97316', glow:'rgba(249,115,22,0.25)',  label:'Angry',   desc:"Someone's got some feelings right now.",       msg:"Take a deep breath. Whatever it is, you've got this 🔥" },
  bored:   { emoji:'🥱', color:'#34d399', glow:'rgba(52,211,153,0.25)',  label:'Bored',   desc:'You could not be less interested right now.',  msg:"Same, honestly. Maybe this emoji will cheer you up? 😄" }
};

let currentMode='upload', uploadedImage=null, snappedImage=null, stream=null;

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('mm_gemini_key');
  if (saved) { document.getElementById('apiKey').value = saved; showKeyStatus('✓ Key loaded'); }
});

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  localStorage.setItem('mm_gemini_key', k);
  showKeyStatus('✓ Saved!');
}
function showKeyStatus(msg) { const s=document.getElementById('keyStatus'); s.textContent=msg; setTimeout(()=>s.textContent='',3000); }
function getKey() { return document.getElementById('apiKey').value.trim(); }

function switchTab(tab) {
  currentMode=tab;
  document.getElementById('tabUpload').classList.toggle('active', tab==='upload');
  document.getElementById('tabCamera').classList.toggle('active', tab==='camera');
  document.getElementById('panelUpload').classList.toggle('active', tab==='upload');
  document.getElementById('panelCamera').classList.toggle('active', tab==='camera');
  updateAnalyseBtn();
}

function handleDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('dragover'); }
function handleDragLeave() { document.getElementById('dropZone').classList.remove('dragover'); }
function handleDrop(e) { e.preventDefault(); handleDragLeave(); const f=e.dataTransfer.files[0]; if(f) loadFile(f); }
function handleFile(e) { const f=e.target.files[0]; if(f) loadFile(f); }

function loadFile(file) {
  if (!file.type.startsWith('image/')) return showError('Please upload an image file.');
  const r = new FileReader();
  r.onload = ev => {
    uploadedImage = ev.target.result.split(',')[1];
    document.getElementById('uploadPreview').src = ev.target.result;
    document.getElementById('uploadPreviewWrap').style.display = 'block';
    updateAnalyseBtn();
  };
  r.readAsDataURL(file);
}

function clearUpload() {
  uploadedImage=null;
  document.getElementById('uploadPreviewWrap').style.display='none';
  document.getElementById('uploadPreview').src='';
  document.getElementById('fileInput').value='';
  updateAnalyseBtn();
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' } });
    const v = document.getElementById('video');
    v.srcObject = stream; v.style.display='block';
    document.getElementById('camPlaceholder').style.display='none';
    document.getElementById('snapCanvas').style.display='none';
    document.getElementById('startBtn').disabled=true;
    document.getElementById('snapBtn').disabled=false;
    document.getElementById('stopBtn').disabled=false;
    snappedImage=null; updateAnalyseBtn();
  } catch(e) { showError('Camera access denied. Please allow camera permission.'); }
}

function snapPhoto() {
  const v=document.getElementById('video'), c=document.getElementById('snapCanvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  snappedImage=c.toDataURL('image/jpeg').split(',')[1];
  c.style.display='block'; v.style.display='none';
  stopCamera(true); updateAnalyseBtn();
}

function stopCamera(keep=false) {
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  if (!keep) {
    snappedImage=null;
    document.getElementById('video').style.display='none';
    document.getElementById('snapCanvas').style.display='none';
    document.getElementById('camPlaceholder').style.display='flex';
  }
  document.getElementById('startBtn').disabled=false;
  document.getElementById('snapBtn').disabled=true;
  document.getElementById('stopBtn').disabled=true;
  updateAnalyseBtn();
}

function updateAnalyseBtn() {
  document.getElementById('analyseBtn').disabled = !(currentMode==='upload' ? uploadedImage : snappedImage);
}

async function analyse() {
  const key = getKey();
  if (!key) return showError('Please enter your Gemini API key above.');
  const img = currentMode==='upload' ? uploadedImage : snappedImage;
  if (!img) return showError('No image found. Please upload or snap a photo.');

  hideError(); setLoading(true);

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type:'image/jpeg', data: img } },
            { text: 'Look at this image. Classify the facial expression as EXACTLY ONE of: happy, sad, neutral, angry, bored. Respond ONLY with JSON like this: {"mood":"happy"}. No other text. If no face visible, return {"mood":"neutral"}.' }
          ]}],
          generationConfig: { maxOutputTokens:50, temperature:0 }
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw  = data.candidates[0].content.parts[0].text.trim();
    const json = JSON.parse(raw.replace(/```json|```/g,'').trim());
    const mood = json.mood?.toLowerCase();
    if (!MOODS[mood]) throw new Error('Unexpected mood: ' + mood);
    showResult(mood);
  } catch(e) {
    showError('Something went wrong: ' + e.message);
  } finally {
    setLoading(false);
  }
}

function showResult(mood) {
  const m = MOODS[mood];
  document.getElementById('resultEmoji').textContent = m.emoji;
  document.getElementById('resultMood').textContent  = m.label;
  document.getElementById('resultMood').style.color  = m.color;
  document.getElementById('resultDesc').textContent  = m.desc;
  document.getElementById('resultMsg').textContent   = m.msg;
  document.getElementById('overlayGlow').style.background =
    `radial-gradient(ellipse 70% 60% at 50% 40%, ${m.glow} 0%, transparent 70%)`;
  document.getElementById('resultOverlay').classList.add('show');
  document.addEventListener('keydown', escListener);
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.removeEventListener('keydown', escListener);
}
function escListener(e) { if(e.key==='Escape') closeResult(); }

function setLoading(on) {
  document.getElementById('loading').classList.toggle('active', on);
  document.getElementById('analyseBtn').disabled = on;
}
function showError(msg) { const b=document.getElementById('errorBox'); b.textContent=msg; b.classList.add('show'); }
function hideError() { document.getElementById('errorBox').classList.remove('show'); }
</script>
</body>
</html>
